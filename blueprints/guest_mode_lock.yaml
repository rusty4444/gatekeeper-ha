blueprint:
  name: Gatekeeper — Guest mode from lock code
  description: Activate guest mode when a specific lock code is entered.
  domain: automation
  source_url: https://github.com/rusty4444/gatekeeper-ha/blob/main/blueprints/guest_mode_lock.yaml
  input:
    lock_entity:
      name: Smart lock
      description: The lock that will trigger guest mode
      selector:
        entity:
          domain: lock
    lock_code:
      name: Guest lock code
      description: The access code that triggers guest mode (e.g. "5678")
      default: "5678"
      selector:
        text:
    auto_disable_hours:
      name: Auto-disable after (hours)
      description: Automatically disable guest mode after this many hours
      default: 72
      selector:
        number:
          min: 1
          max: 8760
          unit_of_measurement: hours
    notify_action:
      name: Notification action (optional)
      description: >
        Optional notify action to call when guest mode activates
        (e.g. notify.mobile_app_<your_phone>). Leave blank to skip.
      default: []
      selector:
        action:

variables:
  lock_entity_var: !input lock_entity
  lock_code_var: !input lock_code
  auto_disable_hours_var: !input auto_disable_hours

trigger:
  - platform: state
    entity_id: !input lock_entity
    to: "unlocked"

condition:
  - condition: template
    value_template: >
      {% set code = state_attr(lock_entity_var, 'code') or '' %}
      {{ lock_code_var in code }}

action:
  - service: gatekeeper.activate_mode
    data:
      auto_disable_after: "{{ auto_disable_hours_var }}"
      disable_automations: true
      set_safe_states: true

  - choose:
      - conditions: "{{ notify_action | count > 0 }}"
        sequence: !input notify_action
