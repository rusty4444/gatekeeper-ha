blueprint:
  name: Gatekeeper — Guest token on doorbell
  description: >
    Auto-create a guest token when the doorbell rings and notify the
    homeowner with the share link.
  domain: automation
  source_url: https://github.com/rusty4444/gatekeeper-ha/blob/main/blueprints/guest_arrived.yaml
  input:
    doorbell_entity:
      name: Doorbell entity
      description: The binary sensor that triggers when someone rings
      selector:
        entity:
          domain: binary_sensor
    token_duration:
      name: Token duration (hours)
      description: How long the guest access link stays valid
      default: 4
      selector:
        number:
          min: 1
          max: 168
          unit_of_measurement: hours
    notify_action:
      name: Notification action
      description: >
        The notify action to call (e.g. notify.mobile_app_<your_phone>).
        Pick the specific notify service for the device that should receive
        the link — the generic notify.mobile_app group does not exist.
      selector:
        action:

# Expose the blueprint inputs we want to template against as variables.
# Without this block, !input names are NOT available inside Jinja.
variables:
  token_duration_var: !input token_duration

trigger:
  - platform: state
    entity_id: !input doorbell_entity
    to: "on"

action:
  - service: gatekeeper.create_token
    data:
      label: "Doorbell guest"
      duration: "{{ token_duration_var }}"
      scoped_entities:
        - "lock.*"
        - "light.*"
      scoped_domains:
        - lock
        - light
      allowed_services:
        - lock.unlock
        - light.turn_on
        - light.turn_off
    response_variable: token_result

  - choose:
      - conditions:
          - condition: template
            value_template: >
              {{ token_result is mapping and token_result.get('guest_url') }}
        sequence: !input notify_action
    # The notify action receives token_result via the action's own template
    # context. Configure your notify message to use {{ token_result.guest_url }}
    # and {{ token_duration_var }} when wiring up the action.
