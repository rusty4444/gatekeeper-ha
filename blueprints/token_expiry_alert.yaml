blueprint:
  name: Gatekeeper — Token expiry alert
  description: Get notified when a guest token is about to expire.
  domain: automation
  source_url: https://github.com/rusty4444/gatekeeper-ha/blob/main/blueprints/token_expiry_alert.yaml
  input:
    expiry_threshold:
      name: Expiry threshold (minutes)
      description: Send alert when token has less than this many minutes remaining
      default: 30
      selector:
        number:
          min: 5
          max: 1440
          unit_of_measurement: minutes
    notify_action:
      name: Notification action
      description: >
        Notify action to call (e.g. notify.mobile_app_<your_phone>).
      selector:
        action:

variables:
  expiry_threshold_var: !input expiry_threshold

trigger:
  - platform: time_pattern
    minutes: "/15"

condition:
  - condition: template
    value_template: >
      {% set tokens = state_attr('sensor.gatekeeper_active_tokens', 'tokens') or [] %}
      {% set threshold = expiry_threshold_var | int %}
      {% set ns = namespace(alert=false) %}
      {% for token in tokens %}
        {% if token.is_active and token.expires_at %}
          {% set expires = as_timestamp(token.expires_at) %}
          {% set remaining = (expires - as_timestamp(now())) / 60 %}
          {% if remaining > 0 and remaining < threshold %}
            {% set ns.alert = true %}
          {% endif %}
        {% endif %}
      {% endfor %}
      {{ ns.alert }}

action: !input notify_action
